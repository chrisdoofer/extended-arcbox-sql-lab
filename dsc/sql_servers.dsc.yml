# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
# Extended ArcBox SQL Lab - 10 SQL Server VMs using differencing disks
# Each VM uses a differencing disk from the parent SQL VHD to save storage
properties:
  resources:
    # SQL Server 01 - ERP Database Server (Finance)
    - resource: HyperVDsc/VMHyperV
      id: namingPrefixStage-SQL01
      directives:
        description: Configure VM namingPrefixStage-SQL01 - ERP/Finance SQL Server
      settings:
        Name: namingPrefixStage-SQL01
        SwitchName: 'InternalNATSwitch'
        VhdPath: F:\Virtual Machines\namingPrefixStage-SQL01.vhdx
        ProcessorCount: 2
        StartupMemory: '4GB'
        RestartIfNeeded: true
        State: Running
        Generation: 2
        Path: F:\Virtual Machines
        EnableGuestService: true
        SecureBoot: true

    # SQL Server 02 - CRM Database Server
    - resource: HyperVDsc/VMHyperV
      id: namingPrefixStage-SQL02
      directives:
